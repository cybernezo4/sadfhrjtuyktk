<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bot Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>🦖 Panel</h2>
  <button onclick="action('start')">▶ Start</button>
  <button onclick="action('stop')">⛔ Stop</button>
  <button onclick="action('restart')">🔄 Restart</button>
</div>

<div class="main">
  <div class="cards">
    <div class="card">
      <h3>Status</h3>
      <p id="status">Unknown</p>
    </div>

    <div class="card">
      <h3>Bot</h3>
      <p>Discord.js Node Bot</p>
    </div>

    <div class="card">
      <h3>Console</h3>
      <div id="console"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
